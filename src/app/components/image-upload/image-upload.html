<div class="space-y-3">
  @if (previewUrl()) {
    <!-- Preview con opción de eliminar -->
    <div
      class="relative w-full aspect-video rounded-lg overflow-hidden bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 group transition-colors"
    >
      <img [src]="previewUrl()!" alt="Preview" class="w-full h-full object-cover" />
      <button
        type="button"
        (click)="deletePreview()"
        class="absolute top-2 right-2 p-1.5 bg-black/50 hover:bg-black/70 text-white rounded-lg opacity-0 group-hover:opacity-100 transition-opacity"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>
  } @else {
    <!-- Dropzone -->
    <div
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave($event)"
      (drop)="onDrop($event)"
      (click)="fileInput.click()"
      [class]="
        'w-full aspect-video rounded-lg border-2 border-dashed cursor-pointer flex flex-col items-center justify-center gap-2 transition-all ' +
        dropzoneClass()
      "
    >
      <svg
        class="w-8 h-8 text-gray-300 dark:text-gray-600 transition-colors"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
        />
      </svg>
      <p class="text-sm text-gray-400 dark:text-gray-500 text-center px-4 transition-colors">
        Arrastra una imagen o haz clic para seleccionar
      </p>
      <p class="text-xs text-gray-300 dark:text-gray-600 transition-colors">PNG, JPG, WebP</p>
    </div>
  }

  <input
    #fileInput
    type="file"
    accept="image/png,image/jpeg,image/webp"
    (change)="onFileSelected($event)"
    class="hidden"
  />

  @if (error()) {
    <p class="text-xs text-red-500">{{ error() }}</p>
  }
</div>
