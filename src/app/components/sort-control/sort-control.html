<div class="relative inline-block">
  <select
    [(ngModel)]="criteria"
    (ngModelChange)="changeCriteria($event)"
    class="appearance-none px-4 py-2 pr-8 bg-gray-50 dark:bg-gray-800 border-0 rounded-lg text-sm text-gray-600 dark:text-gray-300 focus:ring-2 focus:ring-gray-200 dark:focus:ring-gray-700 cursor-pointer hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors"
  >
    <option value="recientes">Más recientes</option>
    <option value="valoracion-desc">Valoración ↓</option>
    <option value="valoracion-asc">Valoración ↑</option>
    <option value="alfabetico-asc">A-Z</option>
    <option value="alfabetico-desc">Z-A</option>
    <option value="estado">Por estado</option>
  </select>
  <svg
    class="absolute right-0 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400 pointer-events-none"
    fill="none"
    stroke="currentColor"
    viewBox="0 0 24 24"
  ></svg>
</div>
