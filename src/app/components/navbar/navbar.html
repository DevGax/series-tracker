<nav
  class="bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 px-6 py-4 transition-colors duration-300"
>
  <div class="max-w-5xl mx-auto flex items-center justify-between">
    <a
      routerLink="/"
      class="text-xl font-light tracking-tight text-gray-900 dark:text-white transition-colors"
    >
      Series<span class="font-medium">Tracker</span>
    </a>

    <div class="flex items-center gap-6">
      <a
        routerLink="/"
        class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors"
        >Inicio</a
      >
      <a
        routerLink="/nueva"
        class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors"
        >Añadir serie</a
      >

      <!-- Toggle tema -->
      <button
        (click)="theme.toggle()"
        class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-all"
        [title]="theme.temaEfectivo() === 'dark' ? 'Cambiar a claro' : 'Cambiar a oscuro'"
      >
        @if (theme.temaEfectivo() === 'dark') {
          <!-- Sol -->
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
        } @else {
          <!-- Luna -->
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
            />
          </svg>
        }
      </button>
    </div>
  </div>
</nav>
