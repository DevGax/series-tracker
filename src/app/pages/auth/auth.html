<div
  class="flex-1 flex items-center justify-center px-6 bg-gray-50 dark:bg-gray-950 transition-colors"
>
  <div class="w-full max-w-sm">
    <div class="text-center mb-10">
      <h1 class="text-2xl font-light text-gray-900 dark:text-white mb-2">
        Series<span class="font-medium">Tracker</span>
      </h1>
      <p class="text-sm text-gray-400">
        {{ mode === 'login' ? 'Inicia sesión para continuar' : 'Crea tu cuenta' }}
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <input
          type="email"
          formControlName="email"
          placeholder="Email"
          class="w-full px-4 py-3 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-gray-200 dark:focus:ring-gray-700 transition-colors placeholder:text-gray-400"
        />
      </div>
      <div>
        <input
          type="password"
          formControlName="password"
          placeholder="Contraseña"
          class="w-full px-4 py-3 bg-white dark:bg-gray-900 border border-gray-200 dark:border-gray-800 rounded-lg text-sm text-gray-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-gray-200 dark:focus:ring-gray-700 transition-colors placeholder:text-gray-400"
        />
      </div>

      @if (error()) {
        <p class="text-sm text-red-500 text-center">{{ error() }}</p>
      }

      <button
        type="submit"
        [disabled]="form.invalid || loading()"
        class="w-full py-3 bg-gray-900 dark:bg-white text-white dark:text-gray-900 text-sm font-medium rounded-lg hover:bg-gray-800 dark:hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
      >
        {{ loading() ? 'Procesando...' : mode === 'login' ? 'Entrar' : 'Registrarse' }}
      </button>
    </form>

    <div class="mt-6 text-center">
      <button
        (click)="changeMode()"
        class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors"
      >
        {{ mode === 'login' ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Entra' }}
      </button>
    </div>
  </div>
</div>
