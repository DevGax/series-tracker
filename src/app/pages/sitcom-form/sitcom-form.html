<div class="max-w-2xl mx-auto px-6 py-12">
  <h1 class="text-2xl font-light text-gray-900 mb-8">Añadir nueva serie</h1>

  <form [formGroup]="form" (ngSubmit)="guardar()" class="space-y-6">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Título</label>
      <input
        type="text"
        formControlName="title"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm"
      />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Plataforma</label>
        <select
          formControlName="platform"
          class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm bg-white"
        >
          <option value="Netflix">Netflix</option>
          <option value="HBO Max">HBO Max</option>
          <option value="Amazon Prime">Amazon Prime</option>
          <option value="Disney+">Disney+</option>
          <option value="Apple TV+">Apple TV+</option>
          <option value="Otra">Otra</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Temporadas</label>
        <input
          type="number"
          formControlName="seasons"
          min="1"
          class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm"
        />
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
        <select
          formControlName="state"
          class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm bg-white"
        >
          <option value="pending">Pendiente</option>
          <option value="viewing">Viendo</option>
          <option value="completed">Completada</option>
          <option value="abandoned">Abandonada</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Valoración (1-10)</label>
        <input
          type="number"
          formControlName="rating"
          min="1"
          max="10"
          class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm"
        />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1"
        >Géneros (separados por coma)</label
      >
      <input
        type="text"
        formControlName="genre"
        placeholder="Drama, Thriller, Sci-Fi"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Tu opinión</label>
      <textarea
        formControlName="opinion"
        rows="4"
        placeholder="¿Qué te ha parecido?"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-gray-200 text-sm resize-none"
      ></textarea>
    </div>

    <div class="flex gap-3 pt-4">
      <button
        type="submit"
        [disabled]="form.invalid"
        class="px-6 py-2 bg-gray-900 text-white text-sm rounded-lg hover:bg-gray-800 disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
      >
        Guardar serie
      </button>
      <a
        routerLink="/"
        class="px-6 py-2 border border-gray-200 text-gray-600 text-sm rounded-lg hover:bg-gray-50 transition-colors"
      >
        Cancelar
      </a>
    </div>
  </form>
</div>
